name: mallku_app
description: "Mavoo Race - Cronometro Hyrox"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/mavoo_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1788B0"
  adaptive_icon_foreground: "assets/images/mavoo_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
